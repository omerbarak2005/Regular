  :root {

  /* TOP BAR */

    position: sticky; top: 0; z-index: 100;
    background: rgba(9,9,14,0.97); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 20px; padding: 0 24px; height: 54px;
  }
  .brand { font-size: 14px; font-weight: 800; letter-spacing: -.01em; white-space: nowrap; }
  .brand span { color: var(--gold); }
  .search-wrap { position: relative; flex: 1; max-width: 380px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 7px 12px 7px 32px; font-size: 13px; outline: none;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .topbar-meta { margin-left: auto; display: flex; gap: 20px; }
  .meta-item { font-size: 12px; color: var(--muted); }
  .meta-item b { color: var(--text); font-weight: 700; }

  /* LAYOUT */
  .layout { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 210px; min-width: 210px; position: sticky; top: 54px;
    height: calc(100vh - 54px); overflow-y: auto;
    background: var(--surface); border-right: 1px solid var(--border); padding: 12px 0;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .slabel { font-size: 9px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: 10px 14px 4px; }
  .sitem {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 14px; cursor: pointer; font-size: 12.5px; color: var(--muted);
    border-left: 2px solid transparent; transition: all .12s; gap: 6px;
  }
  .sitem:hover { color: var(--text); background: var(--surface2); }
  .sitem.active { color: var(--gold); border-left-color: var(--gold); background: rgba(240,180,41,.05); font-weight: 600; }
  .scount { font-size: 10px; background: var(--surface2); padding: 1px 5px; border-radius: 8px; color: var(--muted); flex-shrink: 0; }

  /* MAIN */
  .main { flex: 1; padding: 20px 24px; min-width: 0; }

  /* TIER FILTERS */
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .fbtn {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .12s;
  }
  .fbtn:hover { color: var(--text); border-color: var(--muted); }
  .fbtn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }

  /* SECTION */
  .section { margin-bottom: 36px; }
  .sec-head {
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 14px;
  }
  .sec-title { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .sec-count { font-size: 11px; color: var(--muted); }
  .inner-circle .sec-title { color: var(--gold); }
  .inner-circle .sec-head { border-bottom-color: rgba(240,180,41,.25); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }

  /* CARD */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color .12s, background .12s;
  }
  .card:hover { border-color: rgba(240,180,41,.4); background: var(--surface2); }
  .inner-circle .card { border-color: rgba(240,180,41,.15); }

  .card-row1 { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-info { min-width: 0; flex: 1; }
  .cname { font-size: 14px; font-weight: 700; color: var(--text); }
  .ctitle { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.35; }
  .corg { font-size: 11.5px; font-weight: 600; color: #b0b0d0; margin-top: 1px; }
  .cnote { font-size: 11px; color: var(--gold); margin-top: 3px; font-style: italic; }

  .tbadge {

  .t-1 { background: rgba(240,180,41,.1); color: var(--gold); border: 1px solid rgba(240,180,41,.2); }
  .t-2 { background: rgba(79,142,247,.1); color: var(--blue); border: 1px solid rgba(79,142,247,.2); }

  .t-mentor { background: rgba(167,139,250,.1); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }

  .card-actions { display: flex; gap: 5px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 6px;
    border: none; cursor: pointer; text-decoration: none; transition: opacity .12s;

  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; color: var(--muted); }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--green); color: #000; font-weight: 700; font-size: 12px;
    padding: 8px 14px; border-radius: 8px;
    opacity: 0; transform: translateY(8px); transition: all .18s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .empty { padding: 60px; text-align: center; color: var(--muted); font-size: 14px; }
</style>

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeCat = 'all';
let activeTier = 'all';
let query = '';

const CAT_ORDER = [
  'Inner Circle', 'Power Network', 'Goldman Sachs', 'Finance', 'PE / VC',
  'Tech / AI', 'Law', 'Consumer', 'Healthcare',
  'JHP Mentors', 'Penn Peers', 'Israel', 'Athletics'
];

const CAT_SC = {
  'Inner Circle': 'sc-0', 'Power Network': 'sc-1', 'Goldman Sachs': 'sc-2',
  'Finance': 'sc-3', 'PE / VC': 'sc-4', 'Tech / AI': 'sc-5',
  'Law': 'sc-6', 'Consumer': 'sc-7', 'Healthcare': 'sc-8',
  'JHP Mentors': 'sc-9', 'Penn Peers': 'sc-10', 'Israel': 'sc-11', 'Athletics': 'sc-12'
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const TIER_MAP = {
  'inner':    ['t-inner', '⭐ Inner Circle'],
  't-1':      ['t-1', 'Power Network'],
  't-2':      ['t-2', 'Senior'],
  't-3':      ['t-3', 'Peer'],
  't-mentor': ['t-mentor', 'JHP Mentor'],
};

function liIcon() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>`;
}
function mailIcon() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`;
}
function copyIcon() {
  return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
}

function copyText(t) {
  navigator.clipboard.writeText(t);
  const el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function filtered() {
  return C.filter(c => {
    if (activeCat !== 'all' && c.cat !== activeCat) return false;
    if (activeTier !== 'all' && c.tier !== activeTier) return false;
    if (query) {
      const q = query.toLowerCase();
      if (![c.name, c.title, c.org, ...(c.tags||[]), c.note||''].some(s => s && s.toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const data = filtered();
  const root = document.getElementById('root');
  root.innerHTML = '';

  const catsToShow = activeCat === 'all' ? CAT_ORDER : [activeCat];
  const groups = {};
  CAT_ORDER.forEach(cat => groups[cat] = []);
  data.forEach(c => { if (groups[c.cat]) groups[c.cat].push(c); });

  let total = 0;
  catsToShow.forEach(cat => {
    const items = groups[cat];
    if (!items || items.length === 0) return;
    total += items.length;

    const sec = document.createElement('div');
    sec.className = 'section' + (cat === 'Inner Circle' ? ' inner-circle' : '');

    const gid = 'g' + cat.replace(/[^a-zA-Z0-9]/g, '');
    sec.innerHTML = `<div class="sec-head"><span class="sec-title">${cat}</span><span class="sec-count">${items.length}</span></div><div class="grid" id="${gid}"></div>`;
    root.appendChild(sec);

    const grid = document.getElementById(gid);
    items.forEach(c => {
      const [tc, tl] = TIER_MAP[c.tier] || ['t-3', c.tier];
      const liUrl = c.li || `https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(c.name)}`;
      const tags = (c.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
      const emailPart = c.email
        ? `<a class="btn btn-mail" href="mailto:${c.email}" onclick="event.stopPropagation()">${mailIcon()} ${c.email}</a><button class="btn btn-copy" onclick="copyText('${c.email}');event.stopPropagation()" title="Copy">${copyIcon()}</button>`
        : '';
      const notePart = c.note ? `<div class="cnote">"${c.note}"</div>` : '';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-row1">
          <div class="card-info">
            <div class="cname">${c.name}</div>
            <div class="ctitle">${c.title}</div>
            <div class="corg">${c.org}</div>
            ${notePart}
          </div>
          <span class="tbadge ${tc}">${tl}</span>
        </div>
        <div class="card-actions">
          <a class="btn btn-li" href="${liUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${liIcon()} LinkedIn</a>
          ${emailPart}
        </div>
        ${tags ? `<div class="tags">${tags}</div>` : ''}
      `;
      grid.appendChild(card);
    });
  });

  if (total === 0) {
    root.innerHTML = '<div class="empty">No contacts found.</div>';
  }

  // update sidebar counts
  document.getElementById('sc-all').textContent = total;
  Object.entries(CAT_SC).forEach(([cat, id]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = C.filter(c => c.cat === cat).length;
  });
  document.getElementById('emailCount').textContent = C.filter(c => c.email).length;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.sitem').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.sitem').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    activeCat = el.dataset.cat;
    render();
  });
});

document.querySelectorAll('.fbtn').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeTier = el.dataset.tier;
    render();
  });
});

const searchEl = document.getElementById('search');
searchEl.addEventListener('input', e => { query = e.target.value; render(); });
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchEl) { e.preventDefault(); searchEl.focus(); }
  if (e.key === 'Escape') searchEl.blur();
});

render();
</script>
