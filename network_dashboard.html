<title>Omer Barak — Network Intelligence Dashboard</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --purple: #8b5cf6;
    --pink: #ec4899;
    --teal: #14b8a6;
    --orange: #f97316;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* TOP BANNER */
  .banner {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .banner-left h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .banner-left p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .banner-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avenir-tag {
    background: linear-gradient(135deg, var(--gold), #d97706);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text2);
  }
  .stat-pill span { color: var(--accent); font-weight: 700; }

  /* CONTROLS */
  .controls {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    flex: 1;
    min-width: 220px;
    max-width: 380px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 18px;
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .view-btn {
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    background: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }
  .view-btn.active { background: var(--accent); color: #fff; }

  /* STATS ROW */
  .stats-row {
    display: flex;
    gap: 16px;
    padding: 20px 32px;
    overflow-x: auto;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 22px;
    min-width: 140px;
    flex-shrink: 0;
  }
  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* GRID */
  #contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 16px;
    padding: 0 32px 32px;
  }
  #contact-grid.list-view {
    grid-template-columns: 1fr;
  }

  /* CONTACT CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(59,130,246,0.15);
  }
  .card-header {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }
  .card-info h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .card-info .title {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
    line-height: 1.4;
  }
  .card-info .org {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }
  .cat-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 10px;
  }
  .email-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    margin-bottom: 10px;
  }
  .email-row .email-icon { font-size: 13px; }
  .email-row .email-text {
    font-size: 12px;
    color: var(--accent);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: monospace;
  }
  .email-row .copy-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    padding: 2px;
    transition: color 0.2s;
  }
  .email-row .copy-btn:hover { color: var(--accent); }
  .no-email {
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    margin-bottom: 10px;
    padding: 4px 0;
  }
  .avenir-note {
    background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.03));
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    color: #fbbf24;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .avenir-note .note-label {
    font-weight: 700;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 3px;
    opacity: 0.7;
  }
  .strength-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }
  .strength-label { font-size: 10px; color: var(--text3); }
  .strength-dots {
    display: flex;
    gap: 3px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.filled { background: var(--green); }
  .dot.warm { background: var(--gold); }
  .dot.medium { background: var(--accent); }
  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  .action-btn {
    flex: 1;
    padding: 7px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .action-btn.primary:hover { background: #2563eb; }

  /* SECTION HEADERS */
  .section-header {
    padding: 24px 32px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-count {
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 16px;
  }
  .modal-close:hover { color: var(--red); border-color: var(--red); }
  .modal h2 { font-size: 20px; margin-bottom: 4px; }
  .modal .m-title { color: var(--text2); font-size: 14px; margin-bottom: 16px; }
  .modal-section { margin-bottom: 18px; }
  .modal-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .modal-section p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text2);

  .list-view .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
  }
  .list-view .card::before { display: none; }
  .list-view .avatar { width: 40px; height: 40px; font-size: 15px; }
  .list-view .card-info { flex: 1; }
  .list-view .cat-badge { margin-bottom: 0; }
  .list-view .avenir-note,
  .list-view .card-actions,
  .list-view .strength-row { display: none; }
  .list-view .email-row { margin-bottom: 0; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 2000;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .banner { padding: 14px 16px; }
    .controls { padding: 14px 16px; }
    #contact-grid { padding: 0 16px 24px; gap: 12px; }
    .stats-row { padding: 14px 16px; }
    .section-header { padding: 16px 16px 8px; }
  }

</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
let activeFilter = 'all';
let activeView = 'grid';
let activeContact = null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  updateStats();
  renderContacts(CONTACTS);
}

function updateStats() {
  const total = CONTACTS.length;
  const withEmail = CONTACTS.filter(c => c.email).length;
  const vc = CONTACTS.filter(c => c.cat === 'VC / PE').length;
  const finance = CONTACTS.filter(c => c.cat === 'Finance / Banking').length;
  const tech = CONTACTS.filter(c => c.cat === 'Tech / AI').length;
  const founders = CONTACTS.filter(c => c.cat === 'Entrepreneurship').length;
  const hot = CONTACTS.filter(c => c.hot).length;

  document.getElementById('total-count').textContent = total;
  document.getElementById('email-count').textContent = withEmail;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-email').textContent = withEmail;
  document.getElementById('s-vc').textContent = vc;
  document.getElementById('s-finance').textContent = finance;
  document.getElementById('s-tech').textContent = tech;
  document.getElementById('s-founder').textContent = founders;
  document.getElementById('s-hot').textContent = hot;
}

function getInitials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

function getAvatarColor(name) {
  const colors = ['#3b82f6','#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#14b8a6','#f97316','#ef4444','#84cc16'];
  let hash = 0;
  for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
  return colors[Math.abs(hash) % colors.length];
}

function renderStrength(s, type = 'green') {
  let dots = '';
  for (let i = 1; i <= 5; i++) {
    const cls = i <= s ? (s >= 4 ? 'dot filled' : s >= 3 ? 'dot warm' : 'dot medium') : 'dot';
    dots += `<div class="${cls}"></div>`;
  }
  return dots;
}

function renderCard(c, list = false) {
  const cat = CAT_COLORS[c.cat] || CAT_COLORS['Finance / Banking'];
  const avatar = `<div class="avatar" style="background:${getAvatarColor(c.name)}">${getInitials(c.name)}</div>`;

  const emailBlock = c.email
    ? `<div class="email-row">
         <span class="email-icon">✉</span>
         <span class="email-text">${c.email}</span>
         <button class="copy-btn" onclick="copyEmail(event,'${c.email}')">⎘</button>
       </div>`
    : `<div class="no-email">Email not yet found in inbox</div>`;

  const hotBadge = c.hot ? '🔥 ' : '';

  return `
  <div class="card" onclick="openModal(${CONTACTS.indexOf(c)})"
       style="--bar-color:${cat.bar}; border-top: 3px solid ${cat.bar}">
    <div class="card-header">
      ${avatar}
      <div class="card-info">
        <h3>${hotBadge}${c.name}</h3>
        <div class="title">${c.title}</div>
        <div class="org">${c.org}</div>
      </div>
    </div>
    <span class="cat-badge" style="background:${cat.bg}20; color:${cat.bg}; border:1px solid ${cat.bg}40">${c.cat}</span>
    ${emailBlock}
    <div class="avenir-note">
      <span class="note-label">⚡ Avenir Value</span>
      ${c.avenir}
    </div>
    <div class="strength-row">
      <span class="strength-label">Relationship</span>
      <div class="strength-dots">${renderStrength(c.strength)}</div>
    </div>
    <div class="card-actions">
      <button class="action-btn" onclick="event.stopPropagation(); openModal(${CONTACTS.indexOf(c)})">View Profile</button>
      ${c.email ? `<button class="action-btn primary" onclick="event.stopPropagation(); draftEmail('${c.name}','${c.email}')">✉ Draft Email</button>` : ''}
    </div>
  </div>`;
}

function renderContacts(list) {
  const grid = document.getElementById('contact-grid');
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--text3);">No contacts match your search.</div>`;
    return;
  }

  // Group by category
  const cats = {};
  list.forEach(c => {
    if (!cats[c.cat]) cats[c.cat] = [];
    cats[c.cat].push(c);
  });

  let html = '';
  // Hot contacts first
  const hot = list.filter(c => c.hot);
  if (hot.length && activeFilter === 'all') {
    html += `<div class="section-header" style="grid-column:1/-1">
      <h2>🔥 Priority Relationships</h2><div class="section-line"></div>
      <span class="section-count">${hot.length}</span>
    </div>`;
    hot.forEach(c => html += renderCard(c));
  }

  // By category
  const catOrder = ['VC / PE','Finance / Banking','Entrepreneurship','Tech / AI','Healthcare','Law','Athletics','Penn / Wharton','Entertainment','Real Estate'];
  catOrder.forEach(cat => {
    const items = (cats[cat] || []).filter(c => !c.hot || activeFilter !== 'all');
    if (!items.length) return;
    html += `<div class="section-header" style="grid-column:1/-1">
      <h2>${cat}</h2><div class="section-line"></div>
      <span class="section-count">${items.length}</span>
    </div>`;
    items.forEach(c => html += renderCard(c));
  });

  grid.innerHTML = html;
}

function filterContacts() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = CONTACTS;
  if (activeFilter !== 'all') filtered = filtered.filter(c => c.cat === activeFilter);
  if (q) filtered = filtered.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.org.toLowerCase().includes(q) ||
    c.title.toLowerCase().includes(q) ||
    (c.email || '').toLowerCase().includes(q) ||
    c.tags.some(t => t.toLowerCase().includes(q))
  );
  renderContacts(filtered);
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterContacts();
}

function setView(v, btn) {
  activeView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('contact-grid');
  if (v === 'list') grid.classList.add('list-view');
  else grid.classList.remove('list-view');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const c = CONTACTS[idx];
  activeContact = c;
  const cat = CAT_COLORS[c.cat] || CAT_COLORS['Finance / Banking'];

  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:20px">
      <div class="avatar" style="width:64px;height:64px;font-size:22px;background:${getAvatarColor(c.name)};border-radius:14px">${getInitials(c.name)}</div>
      <div>
        <h2>${c.name}</h2>
        <div class="m-title">${c.title} · ${c.org}</div>
        <span class="cat-badge" style="background:${cat.bg}20;color:${cat.bg};border:1px solid ${cat.bg}40">${c.cat}</span>
      </div>
    </div>

    <div class="modal-section">
      <h4>Contact Info</h4>
      ${c.email ? `<div class="email-row" style="max-width:100%">
        <span class="email-icon">✉</span>
        <span class="email-text">${c.email}</span>
        <button class="copy-btn" onclick="copyEmail(event,'${c.email}')">⎘ Copy</button>
      </div>` : '<p style="color:var(--text3);font-size:13px">Email not yet found in inbox — connect on LinkedIn to request.</p>'}
      ${c.phone ? `<p style="font-size:13px;color:var(--text2);margin-top:8px">📞 ${c.phone}</p>` : ''}
      <p style="font-size:12px;color:var(--text3);margin-top:6px">Last Contact: ${c.lastContact} · How Met: ${c.intro}</p>
    </div>

    <div class="modal-section">
      <h4>Avenir Growth Value</h4>
      <div class="avenir-note">${c.avenir}</div>
    </div>

    <div class="modal-section">
      <h4>Tags</h4>
      <div class="tag-list">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>

    <div class="modal-section">
      <h4>Relationship Strength</h4>
      <div class="strength-dots" style="gap:6px">${renderStrength(c.strength)}</div>
    </div>

    ${c.email ? `
    <div style="display:flex;gap:8px;margin-top:20px">
      <button class="action-btn primary" style="flex:2;padding:12px" onclick="draftEmail('${c.name}','${c.email}')">✉ Draft Avenir Intro Email</button>
      <button class="action-btn" style="flex:1;padding:12px" onclick="copyEmail(event,'${c.email}')">Copy Email</button>
    </div>` : ''}
  `;

  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function copyEmail(e, email) {
  if (e) e.stopPropagation();
  navigator.clipboard.writeText(email).then(() => showToast('Copied: ' + email));
}

function draftEmail(name, email) {
  const subject = encodeURIComponent(`Following Up — Omer Barak, Avenir Growth`);
  const body = encodeURIComponent(`Hi ${name.split(' ')[0]},

I hope you're doing well. I'm reaching out as I've recently joined Avenir Growth for the summer, where I'm focused on deal origination and portfolio strategy.

I'd love to reconnect and share what I've been working on — I think there's real overlap with your work at [Organization] that could be mutually valuable.

Would you have 15–20 minutes for a quick call in the coming weeks?

Best,
Omer Barak
Avenir Growth | UPenn '27 | Division I Wrestler
📱 305-335-0029 | barakom@sas.upenn.edu`);
  window.open(`mailto:${email}?subject=${subject}&body=${body}`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

init();
